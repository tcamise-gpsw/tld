version: 2

project_name: tld

before:
  hooks:
    - go mod tidy
    - sed -i 's/Version = ".*"/Version = "{{ .Version }}"/' cmd/version/version.go
    - npm --prefix frontend version --no-git-tag-version --allow-same-version {{ .Version }}
    - npm --prefix frontend ci
    - npm --prefix frontend run build:app

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/tld/main.go
    binary: tld
    ldflags:
      - -s -w -X github.com/mertcikla/tld/v2/cmd/version.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - repository:
      owner: Mertcikla
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    binaries:
      - tld
    homepage: "https://tldiagram.com"
    description: "CLI for the tlDiagram architecture diagramming system"
    license: "Apache 2.0"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

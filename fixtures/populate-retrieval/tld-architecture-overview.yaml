name: tld architecture overview retrieval fixture
description: >
  Text fixture for tuning populate/retrieval from user-drawn architecture
  overview elements to relevant scanned folders, files, and symbols in tld.
source: delegated codebase explorers
overview:
  - name: CLI
    purpose: Main tld command surface for creating, validating, planning, applying, serving, watching, rendering, and syncing diagrams.
  - name: Workspace YAML Model
    purpose: Diagram-as-code state stored in .tld.yaml, elements.yaml, connectors.yaml, and .tld.lock.
  - name: Planning and Apply Engine
    purpose: Converts workspace YAML into validated diagram mutations and applies them.
  - name: Local Server and ConnectRPC API
    purpose: Local HTTP and ConnectRPC runtime hub between UI, CLI clients, storage, and watch data.
  - name: Embedded Web UI
    purpose: React canvas UI for browsing, editing, importing, and visualizing diagrams.
  - name: SQLite Storage Layer
    purpose: Durable local runtime state for views, elements, connectors, watch facts, density, and version data.
  - name: Watch, Scan, and Enrichment Pipeline
    purpose: Watches source repositories, scans symbols/dependencies, enriches facts, and materializes code-derived diagrams.
  - name: Import, Export, and Render
    purpose: Interoperability for external diagram formats and rendered diagram output.
  - name: MCP Interface
    purpose: Machine-facing Model Context Protocol tools for tld operations.

fixtures:
  - element: CLI
    aliases: [CLI, command line, terminal, Cobra CLI, tld binary, tld command, subcommands, flags]
    expected_folders:
      - { path: cmd, rank: 1, rationale: Primary Cobra CLI package and subcommand tree. }
      - { path: cmd/tld, rank: 2, rationale: Main tld binary entrypoint. }
      - { path: cmd/add, rank: 3, rationale: Representative first-class CLI subcommand. }
      - { path: cmd/connect, rank: 4, rationale: Representative resource CLI subcommand. }
      - { path: internal/cmdutil, rank: 5, rationale: Shared CLI output and command helpers. }
    expected_files:
      - { path: cmd/root.go, rank: 1, rationale: Root command, global flags, command groups, and subcommand registration. }
      - { path: cmd/tld/main.go, rank: 2, rationale: Actual binary main function. }
      - { path: cmd/testutil.go, rank: 3, rationale: Test harness for executing CLI commands. }
      - { path: cmd/add/add.go, rank: 4, rationale: High-signal Cobra subcommand constructor. }
      - { path: cmd/serve/serve.go, rank: 5, rationale: Important command for launching the local server. }
    expected_symbols:
      - { symbol: cmd.NewRootCmd, file: cmd/root.go, rank: 1, rationale: Builds the full Cobra command tree. }
      - { symbol: cmd.Execute, file: cmd/root.go, rank: 2, rationale: Runs the root CLI command. }
      - { symbol: main.main, file: cmd/tld/main.go, rank: 3, rationale: Binary entrypoint. }
      - { symbol: add.NewAddCmd, file: cmd/add/add.go, rank: 4, rationale: Representative resource command constructor. }
      - { symbol: serve.NewServeCmd, file: cmd/serve/serve.go, rank: 5, rationale: Constructs the server command. }
    reject_examples:
      - { path: frontend, rationale: Web UI, not the Go CLI surface. }
      - { path: pkg/api, rationale: API service layer, not CLI command registration. }
      - { path: internal/watch, rationale: Watch implementation; CLI entry is cmd/watch. }

  - element: Workspace YAML Model
    aliases: [workspace files, diagram source, diagrams as code, YAML config, local workspace, elements.yaml, connectors.yaml, .tld.yaml, .tld.lock]
    expected_folders:
      - { path: internal/workspace, rank: 1, rationale: Canonical YAML load/write/validate/merge package. }
      - { path: cmd/initialize, rank: 2, rationale: Creates initial workspace files. }
      - { path: cmd/add, rank: 3, rationale: Mutates elements.yaml. }
      - { path: cmd/connect, rank: 4, rationale: Mutates connectors.yaml. }
      - { path: internal/watch/exportyaml, rank: 5, rationale: Exports analyzed source representation to workspace YAML. }
    expected_files:
      - { path: internal/workspace/types.go, rank: 1, rationale: Defines Workspace, Element, Connector, placement, config, and metadata schema. }
      - { path: internal/workspace/loader.go, rank: 2, rationale: Reads .tld.yaml, elements.yaml, connectors.yaml, and metadata. }
      - { path: internal/workspace/writer.go, rank: 3, rationale: Writes and upserts YAML resources. }
      - { path: internal/workspace/validator.go, rank: 4, rationale: Validates required fields and cross-file refs. }
      - { path: internal/workspace/lockfile.go, rank: 5, rationale: Handles .tld.lock and workspace hashes. }
    expected_symbols:
      - { symbol: workspace.Workspace, file: internal/workspace/types.go, rank: 1, rationale: Loaded local model. }
      - { symbol: workspace.Element, file: internal/workspace/types.go, rank: 2, rationale: Primary elements.yaml resource schema. }
      - { symbol: workspace.Connector, file: internal/workspace/types.go, rank: 3, rationale: connectors.yaml relationship schema. }
      - { symbol: workspace.Load, file: internal/workspace/loader.go, rank: 4, rationale: Main workspace YAML loader. }
      - { symbol: workspace.Save, file: internal/workspace/writer.go, rank: 5, rationale: Main workspace YAML writer. }
    reject_examples:
      - { path: internal/app, rationale: Legacy runtime SQLite model, not YAML source of truth. }
      - { path: internal/store, rationale: SQLite/API persistence, not workspace YAML parsing. }
      - { path: pkg/api/workspace_service.go, rationale: RPC service layer, not local YAML model. }


      - { path: cmd/serve/serve.go, rank: 2, rationale: Foreground/background server command. }
      - { path: internal/localserver/bootstrap.go, rank: 3, rationale: DB/static assets/store/server bootstrap. }
      - { path: internal/server/density.go, rank: 4, rationale: Density and visibility override HTTP endpoints. }

      - { path: cmd/plan, rank: 3, rationale: CLI plan validation and dry-run output. }
      - { path: cmd/validate, rank: 4, rationale: Validation command combining workspace checks and warnings. }
      - { path: internal/store, rank: 5, rationale: Local SQLite ApplyPlan executor. }
    expected_files:
      - { path: internal/planner/plan.go, rank: 1, rationale: Primary plan compiler. }
      - { path: cmd/apply/apply.go, rank: 2, rationale: Main apply workflow. }
      - { path: cmd/apply/target.go, rank: 3, rationale: Local/remote apply runner abstraction. }
      - { path: cmd/plan/plan.go, rank: 4, rationale: Plan command pipeline. }
      - { path: internal/store/apistore.go, rank: 5, rationale: APIAdapter.ApplyPlan mutation engine. }
    expected_symbols:
      - { symbol: planner.Build, file: internal/planner/plan.go, rank: 1, rationale: Central compiler from Workspace to ApplyPlanRequest. }
      - { symbol: planner.Plan, file: internal/planner/plan.go, rank: 2, rationale: Compiled plan container. }
      - { symbol: apply.NewApplyCmd, file: cmd/apply/apply.go, rank: 3, rationale: Top-level apply command. }
      - { symbol: apply.Runner, file: cmd/apply/target.go, rank: 4, rationale: Execution abstraction. }
      - { symbol: store.APIAdapter.ApplyPlan, file: internal/store/apistore.go, rank: 5, rationale: Concrete local mutation executor. }
    reject_examples:

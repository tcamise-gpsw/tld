<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TLD EmbedLab</title>
    <link rel="stylesheet" href="https://unpkg.com/reactflow@11.11.4/dist/style.css" />
    <style>
      :root {
        color-scheme: light;
        --accent: #2563eb;
        --border: #d8dee9;
        --muted: #667085;
        --panel: #ffffff;
        --bg: #f6f8fb;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: #172033;
      }
      .shell {
        display: grid;
        grid-template-columns: 360px 1fr;
        height: 100vh;
        min-height: 0;
      }
      aside {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 16px;
        border-right: 1px solid var(--border);
        background: var(--panel);
        overflow: auto;
      }
      main { min-width: 0; min-height: 0; }
      h1 { font-size: 18px; margin: 0; }
      h2 { font-size: 13px; margin: 0 0 8px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
      input, select, button {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 10px;
        font: inherit;
        background: #fff;
      }
      button {
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        font-weight: 600;
      }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
      }
      .toggle input { width: auto; }
      .card {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        background: #fff;
      }
      .list {
        display: grid;
        gap: 6px;
        max-height: 260px;
        overflow: auto;
      }
      .item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        cursor: pointer;
        background: #fbfcff;
      }
      .item strong { display: block; font-size: 13px; }
      .muted { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
      .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .stat { border: 1px solid var(--border); border-radius: 8px; padding: 8px; }
      .stat strong { display: block; font-size: 18px; }
      .node {
        border: 1px solid #9bb8ff;
        border-radius: 8px;
        padding: 8px 10px;
        background: white;
        min-width: 160px;
        box-shadow: 0 4px 12px rgba(23, 32, 51, .08);
      }
      .node.file { border-color: #a7d7bd; background: #f0fff5; }
      .node.cluster { border-color: #e9b872; background: #fff8e8; }
      .node-title { font-weight: 700; font-size: 13px; }
      .node-subtitle { color: var(--muted); font-size: 11px; margin-top: 3px; overflow-wrap: anywhere; }
      .error { color: #b42318; font-size: 13px; }
      @media (max-width: 900px) {
        .shell { grid-template-columns: 1fr; grid-template-rows: 48vh 52vh; }
        aside { border-right: 0; border-bottom: 1px solid var(--border); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/reactflow@11.11.4/dist/umd/index.js"></script>
    <script>
      const { useCallback, useEffect, useMemo, useState } = React;
      const { ReactFlow, Background, Controls, MiniMap, MarkerType, Handle, Position, useNodesState, useEdgesState } = window.ReactFlow;

      function api(path) {
        return fetch(path).then(async (response) => {
          const body = await response.json();
          if (!response.ok) throw new Error(body.error || response.statusText);
          return body;
        });
      }

      function EmbedNode({ data }) {
        const similarity = data.similarity != null ? data.similarity : 0.5;
        const diameter = 70 + similarity * 100;
        const style = {
          width: `${diameter}px`,
          height: `${diameter}px`,
          borderRadius: '50%',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          textAlign: 'center',
          padding: '10px',
          overflow: 'hidden',
          minWidth: 'unset',
          boxSizing: 'border-box',
        };

        return React.createElement('div', { className: `node ${data.type}`, style },
          React.createElement(Handle, { type: 'target', position: Position.Top, style: { position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', opacity: 0, width: '1px', height: '1px' } }),
          React.createElement('div', { 
            className: 'node-title', 
            style: { 
              fontSize: diameter < 100 ? '10px' : '12px',
              lineHeight: '1.2',
              maxHeight: '2.4em',
              overflow: 'hidden',
              textOverflow: 'ellipsis',
              display: '-webkit-box',
              WebkitLineClamp: 2,
              WebkitBoxOrient: 'vertical',
            } 
          }, data.label),
          diameter >= 120 && data.subtitle && React.createElement('div', { 
            className: 'node-subtitle', 
            style: { 
              fontSize: '9px',
              overflow: 'hidden',
              textOverflow: 'ellipsis',
              whiteSpace: 'nowrap',
              maxWidth: '90%',
            } 
          }, data.subtitle),
          data.similarity != null && diameter >= 95 && React.createElement('div', { className: 'muted', style: { fontSize: '9px', marginTop: '2px' } }, `sim ${data.similarity.toFixed(3)}`),
          data.score != null && diameter >= 130 && React.createElement('div', { className: 'muted', style: { fontSize: '9px' } }, `score ${data.score.toFixed(2)}`),
          React.createElement(Handle, { type: 'source', position: Position.Bottom, style: { position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', opacity: 0, width: '1px', height: '1px' } })
        );
      }

      function FloatingEdge({ id, source, target, style, markerEnd, label }) {
        const sourceNode = window.currentNodesMap ? window.currentNodesMap.get(source) : null;
        const targetNode = window.currentNodesMap ? window.currentNodesMap.get(target) : null;

        if (!sourceNode || !targetNode) return null;

        const sourceSimilarity = sourceNode.data.similarity != null ? sourceNode.data.similarity : 0.5;
        const sourceRadius = (70 + sourceSimilarity * 100) / 2;

        const targetSimilarity = targetNode.data.similarity != null ? targetNode.data.similarity : 0.5;
        const targetRadius = (70 + targetSimilarity * 100) / 2;

        const sourceCenter = {
          x: sourceNode.position.x + sourceRadius,
          y: sourceNode.position.y + sourceRadius
        };
        const targetCenter = {
          x: targetNode.position.x + targetRadius,
          y: targetNode.position.y + targetRadius
        };

        const dx = targetCenter.x - sourceCenter.x;
        const dy = targetCenter.y - sourceCenter.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance === 0) return null;

        const ux = dx / distance;
        const uy = dy / distance;

        const startX = sourceCenter.x + sourceRadius * ux;
        const startY = sourceCenter.y + sourceRadius * uy;

        const endX = targetCenter.x - targetRadius * ux;
        const endY = targetCenter.y - targetRadius * uy;

        const edgePath = `M ${startX} ${startY} L ${endX} ${endY}`;

        const labelX = (startX + endX) / 2;
        const labelY = (startY + endY) / 2;
        const boxWidth = label ? Math.max(40, label.length * 6 + 10) : 40;

        return React.createElement('g', null,
          React.createElement('path', {
            id,
            className: 'react-flow__edge-path',
            d: edgePath,
            style,
            markerEnd
          }),
          label && React.createElement('g', { transform: `translate(${labelX}, ${labelY})` },
            React.createElement('rect', {
              x: -boxWidth / 2,
              y: -8,
              width: boxWidth,
              height: 16,
              rx: 4,
              fill: 'rgba(255, 255, 255, 0.95)',
              stroke: '#d8dee9',
              strokeWidth: 0.5
            }),
            React.createElement('text', {
              fill: '#4a5568',
              fontSize: 9,
              fontWeight: 500,
              textAnchor: 'middle',
              dominantBaseline: 'central',
              style: { pointerEvents: 'none', userSelect: 'none' }
            }, label)
          )
        );
      }

      const nodeTypes = { embed: EmbedNode };
      const edgeTypes = { floating: FloatingEdge };

      function runLayoutSimulation(graph) {
        const nodes = graph.nodes || [];
        const edges = graph.edges || [];
        const N = nodes.length;
        if (N === 0) return {};

        const positions = {};
        nodes.forEach((node, index) => {
          const sim = node.data && node.data.similarity != null ? node.data.similarity : 0.5;
          const radius = (70 + sim * 100) / 2;
          // Spiral starting positions to break symmetry deterministically
          positions[node.id] = {
            x: Math.cos(index * 0.75) * (150 + index * 8),
            y: Math.sin(index * 0.75) * (150 + index * 8),
            radius: radius
          };
        });

        const iterations = 180;
        let temp = 120;
        const gravity = 0.012;

        for (let iter = 0; iter < iterations; iter++) {
          const disp = {};
          nodes.forEach(n => { disp[n.id] = { x: 0, y: 0 }; });

          // Repulsive forces
          for (let i = 0; i < N; i++) {
            const nodeA = nodes[i];
            const posA = positions[nodeA.id];
            for (let j = i + 1; j < N; j++) {
              const nodeB = nodes[j];
              const posB = positions[nodeB.id];

              const dx = posB.x - posA.x;
              const dy = posB.y - posA.y;
              let dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 1) dist = 1;

              const targetDist = posA.radius + posB.radius + 150;
              let force = 0;

              if (dist < targetDist) {
                const overlap = targetDist - dist;
                force = (overlap * overlap * 0.4 + 20) / dist;
              } else {
                force = (targetDist * targetDist) * 0.12 / (dist * dist);
              }

              const fx = (dx / dist) * force;
              const fy = (dy / dist) * force;

              disp[nodeA.id].x -= fx;
              disp[nodeA.id].y -= fy;
              disp[nodeB.id].x += fx;
              disp[nodeB.id].y += fy;
            }
          }

          // Attractive forces along edges
          edges.forEach(edge => {
            const posA = positions[edge.source];
            const posB = positions[edge.target];
            if (!posA || !posB) return;

            const dx = posB.x - posA.x;
            const dy = posB.y - posA.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 1) return;

            const targetDist = posA.radius + posB.radius + 120;
            if (dist > targetDist) {
              const pull = (dist - targetDist) * 0.08;
              const fx = (dx / dist) * pull;
              const fy = (dy / dist) * pull;

              disp[edge.source].x += fx;
              disp[edge.source].y += fy;
              disp[edge.target].x -= fx;
              disp[edge.target].y -= fy;
            }
          });

          // Gravity towards origin
          nodes.forEach(node => {
            const pos = positions[node.id];
            disp[node.id].x -= pos.x * gravity;
            disp[node.id].y -= pos.y * gravity;
          });

          // Update positions
          nodes.forEach(node => {
            const d = disp[node.id];
            const dist = Math.sqrt(d.x * d.x + d.y * d.y);
            if (dist > 0.01) {
              const cappedDist = Math.min(dist, temp);
              positions[node.id].x += (d.x / dist) * cappedDist;
              positions[node.id].y += (d.y / dist) * cappedDist;
            }
          });

          temp *= 0.95;
        }

        const finalCoords = {};
        nodes.forEach(node => {
          finalCoords[node.id] = {
            x: positions[node.id].x,
            y: positions[node.id].y
          };
        });
        return finalCoords;
      }

      const layoutCache = {
        graph: null,
        positions: {}
      };

      function toFlow(graph, showLabels, currentNodes = []) {
        let positions = {};
        if (layoutCache.graph === graph) {
          const currentNodeMap = new Map(currentNodes.map(n => [n.id, n.position]));
          (graph.nodes || []).forEach(node => {
            if (currentNodeMap.has(node.id)) {
              positions[node.id] = currentNodeMap.get(node.id);
            } else if (layoutCache.positions[node.id]) {
              positions[node.id] = layoutCache.positions[node.id];
            } else {
              positions[node.id] = { x: 0, y: 0 };
            }
          });
        } else {
          positions = runLayoutSimulation(graph);
          layoutCache.graph = graph;
          layoutCache.positions = positions;
        }

        const nodes = (graph.nodes || []).map((node) => ({
          id: node.id,
          type: 'embed',
          position: positions[node.id] || { x: 0, y: 0 },
          data: {
            type: node.type,
            label: node.label,
            subtitle: node.subtitle,
            similarity: node.data && node.data.similarity,
            score: node.data && node.data.score,
            raw: node,
          },
        }));

        const edges = (graph.edges || []).map((edge) => ({
          id: edge.id,
          source: edge.source,
          target: edge.target,
          type: 'floating',
          label: showLabels ? edge.label : undefined,
          animated: edge.type === 'similarity',
          markerEnd: (edge.type === 'reference' || edge.type === 'tld-connector') ? { 
            type: MarkerType.ArrowClosed,
            color: edge.type === 'tld-connector' ? '#4f46e5' : '#8a95a8'
          } : undefined,
          style: {
            stroke: edge.type === 'similarity' ? '#2563eb' : 
                    edge.type === 'contains' ? '#20a464' : 
                    edge.type === 'tld-connector' ? '#4f46e5' : '#8a95a8',
            strokeWidth: edge.type === 'similarity' ? 2.5 : 
                         edge.type === 'tld-connector' ? 2.0 : 1.5,
            strokeDasharray: edge.type === 'tld-connector' ? '5 5' : undefined,
          },
        }));

        return { nodes, edges };
      }

      function App() {
        const [repos, setRepos] = useState([]);
        const [models, setModels] = useState([]);
        const [repo, setRepo] = useState('');
        const [model, setModel] = useState('');
        const [query, setQuery] = useState('');
        const [k, setK] = useState(36);
        const [graph, setGraph] = useState(null);
        const [selected, setSelected] = useState(null);
        const [error, setError] = useState('');
        const [showStats, setShowStats] = useState(false);
        const [toggles, setToggles] = useState({ files: true, refs: true, clusters: false, labels: true, scores: true });
        const [nodes, setNodes, onNodesChange] = useNodesState([]);
        const [edges, setEdges, onEdgesChange] = useEdgesState([]);
        const [kmeansClusters, setKmeansClusters] = useState(null);
        const [clusteringLoading, setClusteringLoading] = useState(false);

        // Keep currentNodesMap synchronized on every render for custom floating edges
        window.currentNodesMap = new Map(nodes.map(n => [n.id, n]));

        const nodesRef = React.useRef([]);
        useEffect(() => {
          nodesRef.current = nodes;
        }, [nodes]);

        const loadMeta = useCallback(() => {
          Promise.all([api('/api/repositories'), api('/api/models')])
            .then(([repoList, modelList]) => {
              setRepos(repoList);
              setModels(modelList);
              if (!repo && repoList[0]) setRepo(repoList[0].display_name || String(repoList[0].id));
              if (!model && modelList[0]) setModel(String(modelList[0].id));
            })
            .catch((err) => setError(err.message));
        }, [repo, model]);

        const loadGraph = useCallback((symbolId) => {
          const params = new URLSearchParams({
            repository: repo,
            model,
            k: String(k || 36),
            include_files: String(toggles.files),
            include_refs: String(toggles.refs),
            include_clusters: String(toggles.clusters),
          });
          if (symbolId) params.set('symbol_id', symbolId);
          else if (query.trim()) params.set('query', query.trim());
          setError('');
          api(`/api/graph?${params}`)
            .then((payload) => {
              setGraph(payload);
              setSelected(payload.center || null);
            })
            .catch((err) => setError(err.message));
        }, [repo, model, query, toggles, k]);

        const runKMeans = useCallback(() => {
          setClusteringLoading(true);
          setError('');
          const params = new URLSearchParams({
            repository: repo,
            model,
            algorithm: 'kmeans',
            k: String(k || 8),
          });
          api(`/api/clusters?${params}`)
            .then((payload) => {
              setKmeansClusters(payload.clusters || []);
            })
            .catch((err) => setError(err.message))
            .finally(() => setClusteringLoading(false));
        }, [repo, model, k]);

        useEffect(loadMeta, []);
        useEffect(() => {
          if (repo && model) loadGraph();
        }, [repo, model, toggles.files, toggles.refs, toggles.clusters, k]);

        useEffect(() => {
          if (graph) {
            const flow = toFlow(graph, toggles.labels, nodesRef.current);
            setNodes(flow.nodes);
            setEdges(flow.edges);
          } else {
            setNodes([]);
            setEdges([]);
          }
        }, [graph, toggles.labels, setNodes, setEdges]);

        useEffect(() => {
          setKmeansClusters(null);
        }, [repo, model]);

        const stats = graph && graph.stats;

        return React.createElement('div', { className: 'shell' },
          React.createElement('aside', null,
            React.createElement('div', null,
              React.createElement('h1', null, 'TLD EmbedLab'),
              React.createElement('div', { className: 'muted' }, graph ? `${graph.model.provider}/${graph.model.name} (${graph.model.dimension}d)` : 'MiniLM and watch embedding explorer')
            ),
            error && React.createElement('div', { className: 'error' }, error),
            React.createElement('div', { className: 'row' },
              React.createElement('div', null,
                React.createElement('label', null, 'Repository'),
                React.createElement('select', { value: repo, onChange: (e) => setRepo(e.target.value) },
                  repos.map((item) => React.createElement('option', { key: item.id, value: item.display_name || item.id }, item.display_name || item.repo_root))
                )
              ),
              React.createElement('div', null,
                React.createElement('label', null, 'Model'),
                React.createElement('select', { value: model, onChange: (e) => setModel(e.target.value) },
                  models.map((item) => React.createElement('option', { key: item.id, value: item.id }, `${item.provider}/${item.name}`))
                )
              )
            ),
            React.createElement('div', { className: 'row' },
              React.createElement('div', null,
                React.createElement('label', null, 'Query'),
                React.createElement('input', { value: query, onChange: (e) => setQuery(e.target.value), onKeyDown: (e) => e.key === 'Enter' && loadGraph(), placeholder: 'semantic query or symbol search' })
              ),
              React.createElement('div', null,
                React.createElement('label', null, 'Limit (k)'),
                React.createElement('input', {
                  type: 'number',
                  min: '1',
                  max: '200',
                  value: k,
                  onChange: (e) => {
                    const val = e.target.value;
                    setK(val === '' ? '' : parseInt(val, 10));
                  },
                  onKeyDown: (e) => e.key === 'Enter' && loadGraph()
                })
              )
            ),
            React.createElement('button', { onClick: () => loadGraph() }, 'Query Similarity Graph'),
            React.createElement('section', { className: 'card', style: { display: 'flex', flexDirection: 'column', gap: '8px' } },
              React.createElement('h2', null, 'K-Means Clustering (All Symbols)'),
              React.createElement('button', { 
                onClick: runKMeans, 
                disabled: clusteringLoading, 
                style: { backgroundColor: '#7c3aed', borderColor: '#7c3aed', color: '#fff', fontSize: '13px' } 
              }, clusteringLoading ? 'Clustering...' : 'Run K-Means on All Symbols'),
              kmeansClusters && React.createElement('div', { className: 'list', style: { maxHeight: '300px', gap: '8px', overflowY: 'auto' } },
                kmeansClusters.map((cluster) => React.createElement('div', { key: cluster.id, className: 'item', style: { cursor: 'default', padding: '8px' } },
                  React.createElement('strong', { style: { fontSize: '12px' } }, `${cluster.label} (${cluster.size} symbols)`),
                  React.createElement('div', { className: 'list', style: { marginTop: '4px', maxHeight: '120px', overflowY: 'auto', gap: '2px' } },
                    (cluster.members || []).map((member) => React.createElement('div', {
                      key: member.id,
                      className: 'muted',
                      style: { cursor: 'pointer', padding: '2px 4px', fontSize: '11px', borderRadius: '4px', borderBottom: '1px solid #f0f4f8' },
                      onClick: () => loadGraph(String(member.id))
                    }, member.qualified_name || member.name))
                  )
                ))
              )
            ),
            React.createElement('div', { className: 'toggles' },
              toggle('Files', toggles.files, (v) => setToggles({ ...toggles, files: v })),
              toggle('Refs', toggles.refs, (v) => setToggles({ ...toggles, refs: v })),
              toggle('Clusters', toggles.clusters, (v) => setToggles({ ...toggles, clusters: v })),
              toggle('Labels', toggles.labels, (v) => setToggles({ ...toggles, labels: v })),
              toggle('Stats', showStats, setShowStats),
              toggle('Scores', toggles.scores, (v) => setToggles({ ...toggles, scores: v }))
            ),
            selected && React.createElement('section', { className: 'card' },
              React.createElement('h2', null, 'Selected'),
              React.createElement('strong', null, selected.qualified_name || selected.name),
              React.createElement('div', { className: 'muted' }, `${selected.kind} · ${selected.file_path}:${selected.start_line}`),
              selected.similarity != null && React.createElement('div', { className: 'muted' }, `Similarity ${selected.similarity.toFixed(3)}`),
              selected.score != null && toggles.scores && React.createElement('div', { className: 'muted' }, `Filter score ${selected.score.toFixed(2)} · ${selected.decision || 'unknown'}`),
              selected.reason && toggles.scores && React.createElement('div', { className: 'muted' }, selected.reason)
            ),
            React.createElement('section', { className: 'card' },
              React.createElement('h2', null, 'Nearest Symbols'),
              React.createElement('div', { className: 'list' },
                (graph && graph.neighbors || []).map((sym) => React.createElement('div', { key: sym.id, className: 'item', onClick: () => loadGraph(String(sym.id)) },
                  React.createElement('strong', null, sym.qualified_name || sym.name),
                  React.createElement('div', { className: 'muted' }, `${sym.file_path}:${sym.start_line}`),
                  sym.similarity != null && React.createElement('div', { className: 'muted' }, `sim ${sym.similarity.toFixed(3)}`)
                ))
              )
            ),
            showStats && stats && React.createElement('section', { className: 'card' },
              React.createElement('h2', null, 'Stats'),
              React.createElement('div', { className: 'stats' },
                stat('symbols', stats.symbol_count),
                stat('embedded', stats.embedded_count),
                stat('files', stats.file_count),
                stat('refs', stats.reference_count),
                stat('visible', stats.visible_count),
                stat('hidden', stats.hidden_count)
              )
            )
          ),
          React.createElement('main', null,
            React.createElement(ReactFlow, {
              nodes,
              edges,
              onNodesChange,
              onEdgesChange,
              nodeTypes,
              edgeTypes,
              fitView: true,
              onNodeClick: (_, node) => {
                const raw = node.data.raw;

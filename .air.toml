root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = ["watch"]
  bin = "./tmp/tlddebug"
  cmd = "go build -o ./tmp/tlddebug ./cmd/tld"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "frontend", "data"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = ["cmd", "internal", "pkg"]
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true

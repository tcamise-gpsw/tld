name: Wails Desktop Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build & Sign macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Update Version in wails.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating wails.json version to $VERSION"
          jq --arg ver "$VERSION" '.info.productVersion = $ver' cmd/tld-app/wails.json > tmp.json && mv tmp.json cmd/tld-app/wails.json

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci

      - name: Build Frontend Assets
        run: cd frontend && npm run build:app

      - name: Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}

      - name: Build macOS App
        run: |
          cd cmd/tld-app
          wails build -platform darwin/universal -s

      - name: Sign macOS App
        run: |
          # Discover the imported signing identity name
          IDENTITY_NAME=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1 | cut -d '"' -f 2)
          if [ -z "$IDENTITY_NAME" ]; then
            echo "Error: No Developer ID Application certificate found in keychain."
            exit 1
          fi
          echo "Using signing identity: $IDENTITY_NAME"
          
          # Sign the app bundle using the Hardened Runtime
          codesign --force --deep --options runtime --sign "$IDENTITY_NAME" --timestamp cmd/tld-app/build/bin/tld.app
          
          # Extract Team ID dynamically from the identity string
          TEAM_ID=$(echo "$IDENTITY_NAME" | grep -oE '\([A-Z0-9]{10}\)' | tr -d '()')
          echo "Extracted Team ID: $TEAM_ID"
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "IDENTITY_NAME=$IDENTITY_NAME" >> $GITHUB_ENV

      - name: Notarize macOS App
        run: |
          # Package the app into a zip for submission to Apple
          ditto -c -k --keepParent cmd/tld-app/build/bin/tld.app cmd/tld-app/build/bin/tld_mac.zip
          
          # Submit to Apple's notarization service
          xcrun notarytool submit cmd/tld-app/build/bin/tld_mac.zip \
            --apple-id "mertcikla@gmail.com" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --team-id "${{ env.TEAM_ID }}" \
            --wait
            
          # Staple the notarization ticket to the app bundle
          xcrun stapler staple cmd/tld-app/build/bin/tld.app

      - name: Package macOS App for Release
        run: |
          cd cmd/tld-app/build/bin
          zip -r ../../../../tld-macos-universal.zip tld.app

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tld-macos-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Update Version in wails.json
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating wails.json version to $VERSION"
          jq --arg ver "$VERSION" '.info.productVersion = $ver' cmd/tld-app/wails.json > tmp.json && mv tmp.json cmd/tld-app/wails.json

      - name: Install Frontend Dependencies
        shell: bash
        run: cd frontend && npm ci

      - name: Build Frontend Assets
        shell: bash
        run: cd frontend && npm run build:app

      - name: Build Windows App
        shell: bash
        run: |
          cd cmd/tld-app
          wails build -platform windows/amd64 -nsis -s

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cmd/tld-app/build/bin/tld-amd64-installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

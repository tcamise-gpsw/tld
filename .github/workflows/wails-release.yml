name: Wails Desktop Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build & Sign macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Update Version in wails.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating wails.json version to $VERSION"
          jq --arg ver "$VERSION" '.info.productVersion = $ver' cmd/tld-app/wails.json > tmp.json && mv tmp.json cmd/tld-app/wails.json

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci

      - name: Build Frontend Assets
        run: cd frontend && npm run build:app

      - name: Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}

      - name: Build macOS App
        run: |
          cd cmd/tld-app
          wails build -platform darwin/universal -s

      - name: Sign macOS App
        run: |
          # Discover the imported signing identity name
          IDENTITY_NAME=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1 | cut -d '"' -f 2)
          if [ -z "$IDENTITY_NAME" ]; then
            echo "Error: No Developer ID Application certificate found in keychain."
            exit 1
          fi
          echo "Using signing identity: $IDENTITY_NAME"

          # Sign the app bundle using the Hardened Runtime
          codesign --force --deep --options runtime --sign "$IDENTITY_NAME" --timestamp cmd/tld-app/build/bin/tld.app
          codesign --verify --deep --strict --verbose=2 cmd/tld-app/build/bin/tld.app

          # Extract Team ID dynamically from the identity string
          TEAM_ID=$(echo "$IDENTITY_NAME" | grep -oE '\([A-Z0-9]{10}\)' | tr -d '()')
          echo "Extracted Team ID: $TEAM_ID"
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "IDENTITY_NAME=$IDENTITY_NAME" >> $GITHUB_ENV

      - name: Notarize macOS App
        timeout-minutes: 35
        run: |
          # Package the app into a zip for submission to Apple
          ditto -c -k --keepParent cmd/tld-app/build/bin/tld.app cmd/tld-app/build/bin/tld_mac.zip

          # Submit to Apple's notarization service, then poll explicitly so CI
          # prints useful status and can fetch Apple's log on failure.
          SUBMISSION_JSON=$(xcrun notarytool submit cmd/tld-app/build/bin/tld_mac.zip \
            --apple-id "mertcikla@gmail.com" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --team-id "${{ env.TEAM_ID }}" \
            --output-format json)
          SUBMISSION_ID=$(echo "$SUBMISSION_JSON" | jq -r '.id')
          if [ -z "$SUBMISSION_ID" ] || [ "$SUBMISSION_ID" = "null" ]; then
            echo "Failed to read notarization submission ID."
            echo "$SUBMISSION_JSON"
            exit 1
          fi
          echo "Notarization submission ID: $SUBMISSION_ID"

          for attempt in {1..60}; do
            if ! INFO_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "mertcikla@gmail.com" \
              --password "${{ secrets.APPLE_PASSWORD }}" \
              --team-id "${{ env.TEAM_ID }}" \
              --output-format json); then
              echo "Unable to fetch notarization status ($attempt/60). Retrying..."
              sleep 30
              continue
            fi
            STATUS=$(echo "$INFO_JSON" | jq -r '.status')
            echo "Notarization status ($attempt/60): $STATUS"

            if [ "$STATUS" = "Accepted" ]; then
              break
            fi

            if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "mertcikla@gmail.com" \
                --password "${{ secrets.APPLE_PASSWORD }}" \
                --team-id "${{ env.TEAM_ID }}"
              exit 1
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Timed out waiting for notarization after 30 minutes."
              echo "$INFO_JSON"
              exit 1
            fi

            sleep 30
          done

          # Staple the notarization ticket to the app bundle
          xcrun stapler staple cmd/tld-app/build/bin/tld.app
          xcrun stapler validate cmd/tld-app/build/bin/tld.app

      - name: Package macOS App for Release
        run: |
          cd cmd/tld-app/build/bin
          ditto -c -k --keepParent tld.app ../../../../tld-macos-universal.zip

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tld-macos-universal.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Update Version in wails.json
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Updating wails.json version to $VERSION"
          jq --arg ver "$VERSION" '.info.productVersion = $ver' cmd/tld-app/wails.json > tmp.json && mv tmp.json cmd/tld-app/wails.json

      - name: Install Frontend Dependencies
        shell: bash
        run: cd frontend && npm ci

      - name: Build Frontend Assets
        shell: bash
        run: cd frontend && npm run build:app

      - name: Build Windows App
        shell: bash
        run: |
          cd cmd/tld-app
          wails build -platform windows/amd64 -nsis -s

      - name: Prepare Windows Release Asset
        shell: bash
        run: |
          echo "Wails build output:"
          find cmd/tld-app/build/bin -maxdepth 1 -type f -print

          mapfile -t installers < <(find cmd/tld-app/build/bin -maxdepth 1 -type f -iname '*installer*.exe' -print)
          if [ "${#installers[@]}" -ne 1 ]; then
            echo "Expected exactly one Windows installer, found ${#installers[@]}."
            exit 1
          fi

          cp "${installers[0]}" tld-windows-amd64-installer.exe

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tld-windows-amd64-installer.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

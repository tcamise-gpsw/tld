name: Wails Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to publish release assets to
        required: true
        type: string
      target:
        description: Platform release job to run
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

jobs:
  build-macos:
    name: Build & Sign macOS App
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'macos' || github.event.inputs.target == 'all' }}
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Update Version in wails.json
        run: |
          VERSION=${RELEASE_TAG#v}
          echo "Updating wails.json version to $VERSION"
          jq --arg ver "$VERSION" '.info.productVersion = $ver' cmd/tld-app/wails.json > tmp.json && mv tmp.json cmd/tld-app/wails.json

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci

      - name: Build Frontend Assets
        run: cd frontend && npm run build:app

      - name: Prepare Wails App Icon
        run: |
          mkdir -p cmd/tld-app/build
          cp frontend/logo/macos/Icon-iOS-Default-1024x1024@1x.png cmd/tld-app/build/appicon.png
          rm -f cmd/tld-app/build/windows/icon.ico

      - name: Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}

      - name: Build macOS Apps
        run: |
          cd cmd/tld-app
          rm -rf build/release
          mkdir -p build/release/macos-arm64 build/release/macos-amd64
          VERSION=${RELEASE_TAG#v}
          LDFLAGS="-s -w -X github.com/mertcikla/tld/v2/cmd/version.Version=${VERSION}"

          wails build -platform darwin/arm64 -s -ldflags "$LDFLAGS"
          mv build/bin/tld.app build/release/macos-arm64/tld.app

          wails build -platform darwin/amd64 -s -ldflags "$LDFLAGS"
          mv build/bin/tld.app build/release/macos-amd64/tld.app

      - name: Sign macOS Apps
        run: |
          # Discover the imported signing identity name
          IDENTITY_NAME=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1 | cut -d '"' -f 2)
          if [ -z "$IDENTITY_NAME" ]; then
            echo "Error: No Developer ID Application certificate found in keychain."
            exit 1
          fi
          echo "Using signing identity: $IDENTITY_NAME"

          # Sign the app bundle using the Hardened Runtime
          for app in cmd/tld-app/build/release/macos-arm64/tld.app cmd/tld-app/build/release/macos-amd64/tld.app; do
            codesign --force --deep --options runtime --sign "$IDENTITY_NAME" --timestamp "$app"
            codesign --verify --deep --strict --verbose=2 "$app"
          done

          # Extract Team ID dynamically from the identity string
          TEAM_ID=$(echo "$IDENTITY_NAME" | grep -oE '\([A-Z0-9]{10}\)' | tr -d '()')
          echo "Extracted Team ID: $TEAM_ID"
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "IDENTITY_NAME=$IDENTITY_NAME" >> $GITHUB_ENV

      - name: Notarize macOS Apps
        timeout-minutes: 70
        run: |
          for arch in arm64 amd64; do
            app="cmd/tld-app/build/release/macos-${arch}/tld.app"
            notarization_zip="cmd/tld-app/build/release/tld-desktop-macos-${arch}-notarization.zip"

            # Package the app into a zip for submission to Apple.
            ditto -c -k --keepParent "$app" "$notarization_zip"

            # Submit to Apple's notarization service, then poll explicitly so CI
            # prints useful status and can fetch Apple's log on failure.
            SUBMISSION_JSON=$(xcrun notarytool submit "$notarization_zip" \
              --apple-id "mertcikla@gmail.com" \
              --password "${{ secrets.APPLE_PASSWORD }}" \
              --team-id "${{ env.TEAM_ID }}" \
              --output-format json)
            SUBMISSION_ID=$(echo "$SUBMISSION_JSON" | jq -r '.id')
            if [ -z "$SUBMISSION_ID" ] || [ "$SUBMISSION_ID" = "null" ]; then
              echo "Failed to read notarization submission ID for macOS ${arch}."
              echo "$SUBMISSION_JSON"
              exit 1
            fi
            echo "macOS ${arch} notarization submission ID: $SUBMISSION_ID"

            for attempt in {1..60}; do
              if ! INFO_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
                --apple-id "mertcikla@gmail.com" \
                --password "${{ secrets.APPLE_PASSWORD }}" \
                --team-id "${{ env.TEAM_ID }}" \
                --output-format json); then
                echo "Unable to fetch macOS ${arch} notarization status ($attempt/60). Retrying..."
                sleep 30
                continue
              fi
              STATUS=$(echo "$INFO_JSON" | jq -r '.status')
              echo "macOS ${arch} notarization status ($attempt/60): $STATUS"

              if [ "$STATUS" = "Accepted" ]; then
                break
              fi

              if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "mertcikla@gmail.com" \
                  --password "${{ secrets.APPLE_PASSWORD }}" \
                  --team-id "${{ env.TEAM_ID }}"
                exit 1
              fi

              if [ "$attempt" -eq 60 ]; then
                echo "Timed out waiting for macOS ${arch} notarization after 30 minutes."
                echo "$INFO_JSON"
                exit 1
              fi

              sleep 30
            done

            xcrun stapler staple "$app"
            xcrun stapler validate "$app"
          done

      - name: Package macOS Apps for Release
        run: |
          ditto -c -k --keepParent cmd/tld-app/build/release/macos-arm64/tld.app tld-desktop-macos-arm64.zip
          ditto -c -k --keepParent cmd/tld-app/build/release/macos-amd64/tld.app tld-desktop-macos-x64.zip

      - name: Test macOS desktop update assets
        run: |
          set -euo pipefail

          for asset in tld-desktop-macos-arm64.zip tld-desktop-macos-x64.zip; do
            test -s "$asset"
            extract_dir="${RUNNER_TEMP}/${asset%.zip}"
            rm -rf "$extract_dir"
            mkdir -p "$extract_dir"
            ditto -x -k "$asset" "$extract_dir"
            app_path="$(find "$extract_dir" -maxdepth 2 -type d -name 'tld.app' -print -quit)"
            if [ -z "$app_path" ]; then
              echo "$asset did not contain tld.app"
              exit 1
            fi
            codesign --verify --deep --strict "$app_path"
          done

          host_asset=""
          case "$(uname -m)" in
            arm64) host_asset="tld-desktop-macos-arm64.zip" ;;
            x86_64) host_asset="tld-desktop-macos-x64.zip" ;;
            *)
              echo "Unsupported macOS runner architecture: $(uname -m)"
              exit 1
              ;;
          esac

          e2e_dir="${RUNNER_TEMP}/tld-desktop-update-e2e"
          rm -rf "$e2e_dir"
          mkdir -p "$e2e_dir"
          ditto -x -k "$host_asset" "$e2e_dir"
          e2e_app="$(find "$e2e_dir" -maxdepth 2 -type d -name 'tld.app' -print -quit)"
          if [ -z "$e2e_app" ]; then
            echo "$host_asset did not contain tld.app"
            exit 1
          fi
          "$e2e_app/Contents/MacOS/tld" --desktop-update-e2e --desktop-update-asset "$(pwd)/$host_asset"

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            tld-desktop-macos-arm64.zip
            tld-desktop-macos-x64.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows App
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'windows' || github.event.inputs.target == 'all' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Update Version in wails.json
        shell: bash
        run: |
          VERSION=${RELEASE_TAG#v}
          echo "Updating wails.json version to $VERSION"
          jq --arg ver "$VERSION" '.info.productVersion = $ver' cmd/tld-app/wails.json > tmp.json && mv tmp.json cmd/tld-app/wails.json

      - name: Install Frontend Dependencies
        shell: bash
        run: cd frontend && npm ci

      - name: Build Frontend Assets
        shell: bash
        run: cd frontend && npm run build:app

      - name: Prepare Wails App Icon
        shell: bash
        run: |
          mkdir -p cmd/tld-app/build
          cp frontend/logo/macos/Icon-iOS-Default-1024x1024@1x.png cmd/tld-app/build/appicon.png
          rm -f cmd/tld-app/build/windows/icon.ico

      - name: Install NSIS
        shell: bash
        run: |
          choco install nsis -y --no-progress
          echo "/c/Program Files (x86)/NSIS" >> "$GITHUB_PATH"

      - name: Build Windows App
        shell: bash
        run: |
          cd cmd/tld-app
          export PATH="/c/Program Files (x86)/NSIS:$PATH"
          if ! command -v makensis; then
            echo "makensis was not found on PATH after installing NSIS."
            find "/c/Program Files (x86)" -maxdepth 3 -iname makensis.exe -print || true
            exit 1
          fi
          makensis -VERSION
          VERSION=${RELEASE_TAG#v}
          LDFLAGS="-s -w -X github.com/mertcikla/tld/v2/cmd/version.Version=${VERSION}"
          wails build -platform windows/amd64 -nsis -s -ldflags "$LDFLAGS"

      - name: Prepare Windows Release Asset
        shell: bash
        run: |
          echo "Wails build output:"
          find cmd/tld-app/build/bin -maxdepth 1 -type f -print

          mapfile -t installers < <(find cmd/tld-app/build/bin -maxdepth 1 -type f -iname '*installer*.exe' -print)
          if [ "${#installers[@]}" -ne 1 ]; then
            echo "Expected exactly one Windows installer, found ${#installers[@]}."
            exit 1
          fi

          cp "${installers[0]}" tld-desktop-windows-x64-installer.exe

      - name: Test Windows desktop update asset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $asset = (Resolve-Path 'tld-desktop-windows-x64-installer.exe').Path
          if ((Get-Item $asset).Length -le 0) {
            throw "Desktop update asset is empty: $asset"
          }

          $installDir = Join-Path $env:RUNNER_TEMP 'tld-desktop-test'
          Remove-Item -Recurse -Force $installDir -ErrorAction SilentlyContinue
          $installer = Start-Process -FilePath $asset -ArgumentList @('/S', "/D=$installDir") -Wait -PassThru
          if ($installer.ExitCode -ne 0) {
            throw "Desktop installer exited with code $($installer.ExitCode)"
          }

          $installed = Get-ChildItem -Path $installDir -Recurse -Filter 'tld.exe' | Select-Object -First 1
          if (-not $installed) {
            throw "Silent desktop install did not produce tld.exe under $installDir"
          }

          & $installed.FullName --desktop-update-e2e --desktop-update-asset $asset
          if ($LASTEXITCODE -ne 0) {
            throw "Installed desktop app update e2e failed with code $LASTEXITCODE"
          }

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: tld-desktop-windows-x64-installer.exe
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '15 22 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26.1"]
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build:app

      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code

      - name: Run Go unit tests
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum \
            --junitfile results.xml \
            --format testdox \
            ./...

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Run targeted Go race tests
        run: go test -race ./internal/server ./internal/watch ./pkg/api

      - name: Publish Test Results
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: Go Unit Tests
          path: results.xml
          reporter: java-junit

  e2e-tests:
    name: Playwright E2E Tests
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26.1"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build:app

      - name: Resolve Playwright version
        id: playwright-version
        working-directory: frontend
        run: node -e "console.log('version=' + require('@playwright/test/package.json').version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-chromium

      - name: Install Playwright system dependencies
        working-directory: frontend
        timeout-minutes: 10
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium
        working-directory: frontend
        timeout-minutes: 25
        env:
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: 120000
          DEBUG: pw:install
        run: |
          set -euo pipefail
          npx playwright install chromium
          npx playwright --version
          du -sh ~/.cache/ms-playwright || true

      - name: Build E2E binary
        run: go build -o /tmp/tld-e2e ./cmd/tld

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          TLD_E2E_BINARY: /tmp/tld-e2e
          TLD_E2E_PORT: 1806${{ matrix.shard }}
          TLD_E2E_DATA_DIR: /tmp/tld-playwright-${{ github.run_id }}-${{ matrix.shard }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: report-${{ matrix.shard }}.json
        run: npx playwright test -c playwright.config.ts --shard=${{ matrix.shard }}/4 --reporter=json,line

      - name: Publish Playwright report
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        uses: sidharthv96/playwright-report-action@v2.0-rc.5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-file: frontend/report-${{ matrix.shard }}.json
          skip-step: all

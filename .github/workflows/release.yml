name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  verify-binaries:
    name: Verify binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build:app

      - name: Build native smoke binary
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist-smoke
          version="${GITHUB_REF_NAME#v}"
          output="dist-smoke/tld"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            output="dist-smoke/tld.exe"
          fi
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/mertcikla/tld/v2/cmd/version.Version=${version}" \
            -o "${output}" \
            ./cmd/tld/main.go
          echo "TLD_BINARY=$(pwd)/${output}" >> "$GITHUB_ENV"
          echo "TLD_EXPECT_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Smoke test native binary
        shell: bash
        run: bash scripts/ci/smoke-binary.sh

  goreleaser:
    needs: verify-binaries
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump version to ${{ github.ref_name }} [skip ci]"
          branch: main
          file_pattern: 'frontend/package.json frontend/package-lock.json cmd/version/version.go go.mod go.sum'

      - name: Publish @tldiagram/core-ui to npm
        working-directory: frontend
        shell: bash
        run: |
          npm run build
          NPM_TAG=latest
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            NPM_TAG=beta
          fi
          npm publish --access public --tag "$NPM_TAG"
